name: Audit NPM Packages

on:
  pull_request:
    branches:
      - main

jobs:
  audit:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Create audit output directory
        run: mkdir -p /tmp/audit-outputs

      - name: Audit API Packages
        id: audit-api
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm dlx audit-ci@^7 --directory apps/api --config apps/api/audit-ci.jsonc 2>&1 | tee /tmp/audit-outputs/api.txt

      - name: Report audit failures
        if: always()
        run: |
          if [ "${{ steps.audit-api.outcome }}" == "failure" ]; then
            echo "❌ API audit failed"
            if [ -f "/tmp/audit-outputs/api.txt" ]; then
              sed -n '/Found vulnerable advisory paths:/,$p' "/tmp/audit-outputs/api.txt" | sed 's/\x1b\[[0-9;]*m//g'
            fi
            exit 1
          fi
          echo "✅ Audit passed"
