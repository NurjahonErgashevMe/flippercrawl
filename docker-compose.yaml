name: flippercrawl

x-common-service: &common-service
  # NOTE: If you don't want to build the service locally,
  # comment out the build: statement and uncomment the image: statement
  # image: ghcr.io/firecrawl/firecrawl
  build: apps/api

  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  networks:
    - backend
  extra_hosts:
    - "host.docker.internal:host-gateway"
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  api:
    <<: *common-service
    # Все ключи API (OpenRouter, прокси, Redis, и т.д.) — в apps/api/.env
    env_file:
      - apps/api/.env
    environment:
      HOST: "0.0.0.0"
      PORT: ${INTERNAL_PORT:-3002}
      EXTRACT_WORKER_PORT: ${EXTRACT_WORKER_PORT:-3004}
      WORKER_PORT: ${WORKER_PORT:-3005}
      NUQ_RABBITMQ_URL: amqp://rabbitmq:5672
      ENV: local
      # Перекрывают apps/api/.env: внутри сети compose не localhost:6380, а сервис redis:6379
      REDIS_URL: redis://redis:6379
      REDIS_RATE_LIMIT_URL: redis://redis:6379
      POSTGRES_HOST: nuq-postgres
      # Фиксированный путь в контейнере (не зависит от cwd); файл монтируется ниже
      PROXY_SERVER_LIST_FILE: /app/proxies.txt
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "${PORT:-3002}:${INTERNAL_PORT:-3002}"
    volumes:
      # Реальный пул портов Decodo; не кладём секреты в слои образа (.dockerignore → proxies.txt)
      - ./apps/api/proxies.txt:/app/proxies.txt:ro
    command: node dist/src/harness.js --start-docker
    cpus: 1.7
    mem_limit: 5632M
    memswap_limit: 5632M

  redis:
    image: redis:alpine
    networks:
      - backend
    # Снаружи по умолчанию 6380 — чтобы не конфликтовать с чужим Redis на 6379. Внутри сети compose всё равно redis:6379
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    command: redis-server --bind 0.0.0.0 --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    mem_limit: 384M
    memswap_limit: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"

  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - backend
    ports:
      - "5672:5672"
    command: >
      sh -c "echo 'vm_memory_high_watermark.relative = 0.7' > /etc/rabbitmq/rabbitmq.conf && exec rabbitmq-server"
    mem_limit: 384M
    memswap_limit: 384M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"

  nuq-postgres:
    build: apps/nuq-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    networks:
      - backend
    ports:
      - "${POSTGRES_PORT:-5433}:5433"
    mem_limit: 512M
    memswap_limit: 512M
    command: >
      postgres
        -c shared_buffers=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=256MB
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

networks:
  backend:
    driver: bridge
